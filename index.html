<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKER V_DAWG SYSTEM</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: black;
    color: #00ff66;
    overflow: hidden;
}

/* MATRIX */
#matrix {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* LOGIN SCREEN */
#login {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 5;
}

input {
    background: black;
    border: 1px solid #00ff66;
    color: #00ff66;
    padding: 10px;
    margin: 10px;
    width: 220px;
}

button {
    background: #00ff66;
    color: black;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
}

/* BOOT SCREEN */
#boot {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 6;
    padding: 30px;
}

.boot-text {
    white-space: pre-line;
}

/* DASHBOARD */
#dashboard {
    display: none;
    position: relative;
    z-index: 2;
    padding: 20px;
}

h1 {
    text-shadow: 0 0 10px #00ff66;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    border: 1px solid #00ff66;
    padding: 20px;
    background: rgba(0,0,0,0.7);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00ff66;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div id="login">
    <h2>ACCESS TERMINAL</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">LOGIN</button>
</div>

<!-- BOOT -->
<div id="boot">
    <div class="boot-text" id="bootText"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<h1>HACKER V_DAWG SYSTEM</h1>
<p>Welcome back, Operator.</p>

<h2>Projects</h2>

<div class="grid">

<div class="card">
<h3>Cyber Notes</h3>
<p>Secure note system with login encryption.</p>
</div>

<div class="card">
<h3>Portfolio</h3>
<p>Cyber Vercel-style portfolio UI.</p>
</div>

<div class="card">
<h3>Tools</h3>
<p>Automation scripts for Termux/Linux.</p>
</div>

</div>

</div>

<script>

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let letters = "01HACKERVDAWG$#@%&Ξ";
letters = letters.split("");

const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#00ff66";
    ctx.font = fontSize + "px monospace";

    for(let i=0;i<drops.length;i++){
        let text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
            drops[i]=0;
        }
        drops[i]++;
    }
}
setInterval(drawMatrix,33);

/* LOGIN */
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u && p){
        document.getElementById("login").style.display="none";
        bootSequence();
    } else {
        alert("ACCESS DENIED");
    }
}

/* BOOT SEQUENCE */
function bootSequence(){
    document.getElementById("boot").style.display="block";

    let lines = [
        "Initializing system...",
        "Loading kernel modules...",
        "Bypassing firewall...",
        "Decrypting user profile...",
        "Access granted ✔",
        "Launching dashboard..."
    ];

    let i=0;
    let el=document.getElementById("bootText");

    let interval=setInterval(()=>{
        el.innerHTML += lines[i] + "\n";
        i++;
        if(i>=lines.length){
            clearInterval(interval);
            setTimeout(()=>{
                document.getElementById("boot").style.display="none";
                document.getElementById("dashboard").style.display="block";
            },1000);
        }
    },800);
}

</script>

</body>
</html>
