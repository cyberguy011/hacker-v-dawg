<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKER V_DAWG</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff66;
    font-family: monospace;
    overflow: hidden;
}

/* MATRIX BACKGROUND */
#matrix {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}

/* LOGIN BOX */
.login-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    padding: 30px;
    border: 1px solid #00ff66;
    box-shadow: 0 0 20px #00ff66;
    text-align: center;
    z-index: 2;
}

input {
    background: black;
    border: 1px solid #00ff66;
    color: #00ff66;
    padding: 10px;
    margin: 10px;
    width: 200px;
}

button {
    background: #00ff66;
    color: black;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
}

/* TERMINAL */
#terminal {
    display: none;
    position: absolute;
    top: 10%;
    left: 10%;
    z-index: 2;
}

/* MAIN CONTENT */
#main {
    display: none;
    position: relative;
    z-index: 2;
    padding: 40px;
}

.hero h1 {
    font-size: 3rem;
    text-shadow: 0 0 10px #00ff66;
}

/* PROJECT GRID */
.project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

.project-card {
    background: rgba(0,0,0,0.7);
    border: 1px solid #00ff66;
    padding: 20px;
    border-radius: 10px;
    transition: 0.3s;
}

.project-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 0 20px #00ff66;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
    <h2>ACCESS TERMINAL</h2>
    <input type="text" placeholder="Username"><br>
    <input type="password" placeholder="Password"><br>
    <button onclick="login()">ENTER</button>
</div>

<!-- TERMINAL -->
<div id="terminal">
    <p id="text"></p>
</div>

<!-- MAIN CONTENT -->
<div id="main">

    <div class="hero">
        <h1>HACKER V_DAWG</h1>
        <p>Cybersecurity Student | Developer | Ethical Hacker</p>
    </div>

    <h2>Projects</h2>

    <div class="project-grid">

        <div class="project-card">
            <h3>Cyber Notes</h3>
            <p>Python-based note system with login & search features.</p>
        </div>

        <div class="project-card">
            <h3>Portfolio</h3>
            <p>Cyber-themed developer portfolio with Matrix UI.</p>
        </div>

        <div class="project-card">
            <h3>Python Tools</h3>
            <p>Automation scripts and CLI tools built in Python.</p>
        </div>

    </div>

</div>

<script>
// MATRIX EFFECT
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let letters = "01HACKERVDAWG$#@%&";
letters = letters.split("");

const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff66";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(drawMatrix, 33);

// LOGIN FUNCTION
function login() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("terminal").style.display = "block";

    typeText();
}

// TYPE EFFECT
let i = 0;
let text = "Access Granted... Welcome back, HACKER V_DAWG";

function typeText() {
    if (i < text.length) {
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText, 50);
    } else {
        setTimeout(() => {
            document.getElementById("terminal").style.display = "none";
            document.getElementById("main").style.display = "block";
            document.body.style.overflow = "auto";
        }, 1000);
    }
}
</script>

</body>
</html>
